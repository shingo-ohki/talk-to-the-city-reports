<!DOCTYPE html>
<html>
<head>
    <title>Talk to the City - レポート一覧</title>
    {% include 'partials/head.html' %}
    <link rel="stylesheet" href="/static/css/reports.css">
</head>
{% include 'partials/analytics.html' %}
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h1>レポート一覧</h1>
            <a href="/" class="btn btn-outline-primary">トップへ戻る</a>
        </div>

        <div class="card">
            <div class="card-body">
                {% if reports %}
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th scope="col" class="col-name">レポート名</th>
                                    <th scope="col" class="col-date">生成日時</th>
                                    <th scope="col" class="col-action"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for report in reports %}
                                    <tr>
                                        <td>
                                            {{ report.name }}
                                            {% if report.auto_update %}
                                                <span class="badge bg-info ms-2" title="毎日自動更新">🔄 自動更新</span>
                                            {% endif %}
                                        </td>
                                        <td>{{ report.created_at }}</td>
                                        <td class="text-end">
                                            <a href="{{ report.url }}" class="btn btn-primary btn-sm" target="_blank">
                                                <span class="d-none d-md-inline">レポートを</span>表示
                                            </a>
                                        </td>
                                    </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                {% else %}
                    <div class="text-center text-muted py-4">
                        生成されたレポートはありません。
                    </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
